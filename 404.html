<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 | Event Horizon</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000000;
            color: #a39b8e;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }
        
        #spacetime {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            width: 100vw; 
            height: 100vh;
        }
        
        .terminal-text {
            position: absolute;
            z-index: 10;
            top: 10%;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none; 
        }
        
        h1 {
            font-size: 5rem;
            margin: 0;
            color: #ff471a;
            text-shadow: 0 0 20px rgba(255, 71, 26, 0.8), 0 0 40px rgba(255, 71, 26, 0.4);
            letter-spacing: 12px;
        }
        
        p {
            font-size: 1.1rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #c9d1d9;
            text-shadow: 0 0 8px rgba(201, 209, 217, 0.4);
        }
        
        .abort-btn {
            padding: 15px 30px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #ff471a;
            color: #ff471a;
            font-family: inherit;
            font-size: 1rem;
            cursor: pointer;
            pointer-events: auto; 
            text-transform: uppercase;
            transition: all 0.2s ease;
            letter-spacing: 2px;
        }
        
        .abort-btn:hover {
            background: rgba(255, 71, 26, 0.2);
            box-shadow: 0 0 20px rgba(255, 71, 26, 0.6), inset 0 0 10px rgba(255, 71, 26, 0.4);
            text-shadow: 0 0 5px #ff471a;
        }
    </style>
</head>
<body>

    <canvas id="spacetime"></canvas>
    
    <div class="terminal-text">
        <h1>404</h1>
        <p>Anomaly Detected:<br>Trajectory intersects Event Horizon.</p>
        <button class="abort-btn" onclick="window.location.href='/'">Execute Delta-V Burn</button>
    </div>

    <script>
        const canvas = document.getElementById('spacetime');
        const ctx = canvas.getContext('2d');
        
        let width, height, centerX, centerY;
        const Rs = 85; // Schwarzschild radius
        const particles = [];
        const particleCount = 4000; // Increased density for volumetric plasma look
        const inclination = 0.22; // Sharper viewing angle

        function resize() {
            const dpr = window.devicePixelRatio || 1;
            width = window.innerWidth;
            height = window.innerHeight;
            
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            
            ctx.scale(dpr, dpr);
            
            centerX = width / 2;
            centerY = height * 0.60; 
        }
        window.addEventListener('resize', resize);
        resize();

        class PlasmaVolume {
            constructor() {
                this.reset(true);
            }

            reset(initialSpawn = false) {
                const angle = Math.random() * Math.PI * 2;
                
                // Exponential distribution to clump mass near the ISCO
                const distribution = Math.pow(Math.random(), 2.5);
                const r = Rs + 5 + (distribution * 550); 
                
                this.radius = initialSpawn ? r : (550 + Math.random() * 50);
                this.angle = angle;
                
                // Keplerian velocity curve
                this.angularVel = 0.003 + Math.sqrt(Rs / Math.max(this.radius, Rs)) * 0.022;
                // Gradual inspiral
                this.radialVel = -0.02 - Math.random() * 0.06; 
                
                // z-axis scatter creates disk thickness, pinched at the inner edge
                const thickness = (this.radius - Rs) / 8;
                this.z = (Math.random() - 0.5) * thickness; 
            }

            update() {
                this.angle += this.angularVel;
                this.radius += this.radialVel;
                
                if (this.radius < Rs) {
                    this.reset();
                }

                this.xProjected = centerX + Math.cos(this.angle) * this.radius;
                this.yProjected = centerY + Math.sin(this.angle) * this.radius * inclination + this.z;

                // Relativistic Doppler Beaming
                const velocityX = -Math.sin(this.angle); 
                const dopplerFactor = (velocityX + 1) / 2; 

                // Temperature gradient based on proximity to the singularity
                const temp = Math.max(0, 1 - (this.radius - Rs) / 350);
                
                let r, g, b;
                if (temp > 0.8) { 
                    // X-Ray / UV core (Blueshifted)
                    r = 180 + 75 * dopplerFactor; g = 220 + 35 * dopplerFactor; b = 255;
                } else if (temp > 0.4) { 
                    // Optical thermal mid-disk
                    r = 255; g = 140 + 80 * dopplerFactor; b = 40 + 60 * dopplerFactor;
                } else { 
                    // Infrared outer dust
                    r = 200 + 55 * dopplerFactor; g = 50 + 50 * dopplerFactor; b = 0;
                }
                
                // Lower base alpha to allow for additive bloom to build up naturally
                const alpha = (0.02 + temp * 0.08) * (0.2 + dopplerFactor * 1.8);

                this.color = `rgba(${Math.floor(r)}, ${Math.floor(g)}, ${Math.floor(b)}, ${alpha})`;
                this.size = Math.max(0.5, 2.5 * temp);
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.xProjected, this.yProjected, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new PlasmaVolume());
        }

        function renderFrame() {
            // 1. Clear frame with standard blending to create motion trails
            ctx.globalCompositeOperation = 'source-over';
            ctx.fillStyle = 'rgba(0, 0, 0, 0.35)'; // Fade rate for the trails
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => p.update());

            // 2. Gravitational Lensing / Einstein Ring (Fake light bending over the poles)
            const lensGlow = ctx.createRadialGradient(centerX, centerY - Rs*0.2, Rs * 0.8, centerX, centerY, Rs * 2.5);
            lensGlow.addColorStop(0, 'rgba(0, 0, 0, 0)');
            lensGlow.addColorStop(0.4, 'rgba(255, 120, 40, 0.08)');
            lensGlow.addColorStop(0.6, 'rgba(100, 150, 255, 0.03)');
            lensGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
            
            ctx.fillStyle = lensGlow;
            ctx.beginPath();
            // Draw an elliptical glow behind the black hole to simulate warped top/bottom light
            ctx.ellipse(centerX, centerY, Rs * 2.2, Rs * 1.8, 0, 0, Math.PI * 2);
            ctx.fill();

            // Switch to Additive Blending for Plasma
            ctx.globalCompositeOperation = 'lighter';

            // 3. Draw Background matter (Far side of the disk)
            particles.filter(p => Math.sin(p.angle) < 0).forEach(p => p.draw());

            // Switch back to normal blending for the singularity
            ctx.globalCompositeOperation = 'source-over';

            // 4. Draw the Singularity / Event Horizon
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(centerX, centerY, Rs, 0, Math.PI * 2);
            ctx.fill();
            
            // 5. Draw the Photon Sphere (Trapped light boundary)
            ctx.strokeStyle = 'rgba(255, 220, 150, 0.8)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(centerX, centerY, Rs, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.strokeStyle = 'rgba(255, 100, 20, 0.4)';
            ctx.lineWidth = 4;
            ctx.stroke();

            // Switch back to Additive Blending for the foreground
            ctx.globalCompositeOperation = 'lighter';

            // 6. Draw Foreground matter (Near side of the disk)
            particles.filter(p => Math.sin(p.angle) >= 0).forEach(p => p.draw());

            requestAnimationFrame(renderFrame);
        }

        renderFrame();
    </script>
</body>
</html>
